# The kick message when the Server is restarting
restart-kick = [ "&8-------------------------------", " ", "&8You got &1&lKicked &8because of a &1&lRestart", " ", "&8Reason: &1&l%Reason%", "&8Restarter: &1&l%Player%" ," ", "&8------------------------------" ]

# The maintenance message
maintenance = [ "&8&l>> &4mc.example.com &8&l<<", "&7This network is currently under maintenance", " ", "&7Reason&8: &e%Reason%", " ", "&7You want to contact us?", "&7Discord &8&l>> discord.example.com", "&7Homepage &8&l>> www.example.com" ]

# The JoinMe Message
