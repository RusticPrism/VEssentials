# Set the Global Tablist here
header = [ "&8&m                              &r&8[&1&lExample&r&8]&8&m                            ", "&8Welcome &1%Player% &8on &1mc.example.net" , " ", "&8You´re currently connected to &1%Server%" ]
footer = [" &8Time: &1%Time%", "&8You´re Ping: &1%Ping%", "&8Discord: &1discord.example.com", "&8&m                              &r&8[&1&lExample&r&8]&8&m                            " ]

# The Message announced 30min, 10min, 1min and <10sec before Restarts
