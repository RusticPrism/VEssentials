# Config Version. Pls do not change this!
config-version = "1.0"

# The Prefix of this Plugin
prefix = "&1VEssentials &7>>"

# Message when you don´t have the Permission for something
noperms = "%Prefix% &cYou don´t have the Permission to perform that Command!"

# Message if the action needs you to be a Player
nocons = "%Prefix% &cYou have to be a Player to perform that Command!"

# The to few and to many Arguments Messages
ToFewArgs = "&cYou provided to few Arguments!"
ToManyArgs = "&cYou gave to many Arguments!"

# The ban and kick Message when you get banned/kicked
banmessage = [ "&8-------------------------------", " ", "&8You got &1&lBanned &8by &1&l%Player%", " ", "&8Reason: &1&l%Reason%", " ", "&8Duration: &1&l%Duration%", " ", "&8------------------------------" ]
kickmessage = [ "&8-------------------------------", " ", "&8You got &1&lKicked &8by &1&l%Player%", " ", "&8Reason: &1&l%Reason%", " ", "&8------------------------------" ]

# Change the Motd here
motdline1 = "&e-&6*&e-&6*&e-&6*&e-&6*&e- &6&lThe Example Network &e-&6*&e-&6*&e-&6*&e-&6*&e-"
motdline2 = " &6&l| &e Sub Line  &6&l| &e  mc.example.com    &6&l| &eSub Line &6&l|"

# Change MaintenanceMotd here
MaintenanceMotd1 = "&e-&6*&e-&6*&e-&6*&e-&6*&e- &6&lThe Example Network &e-&6*&e-&6*&e-&6*&e-&6*&e-"
MaintenanceMotd2 = "&6&l| &cMaintenance  &6&l| &emc.example.com &6&l| &cMaintenance &6&l|"

# Enable/Disable the Tablist here
